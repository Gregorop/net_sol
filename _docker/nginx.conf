# ------------------------------
# REQUIRED CONFIGURATION FILES FOR DEPLOYMENT
# ------------------------------

# --- 1. docker-compose.yml (Already created, but listing the necessary content) ---
# This file coordinates backend, db, and frontend services.

# --- 2. docker-compose/Dockerfile.backend (Created in previous step) ---
# Contains the build process for FastAPI/Uvicorn.

# --- 3. docker-compose/Dockerfile.frontend (Created in previous step) ---
# Contains the multi-stage build for React/Nginx.

# --- 4. NGINX Configuration File ---
# This is required by the frontend Dockerfile to serve SPA correctly (fallback routing).
mkdir -p docker-compose
write_file(path="docker-compose/nginx.conf", content="""
server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        # Try to serve the file directly, otherwise rewrite to index.html for React Router handling
        try_files $uri $uri/ /index.html; 
    }
}
""")